<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日A股晨报 - {{DATE}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 {
            font-size: 32px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .date { color: #888; font-size: 16px; margin-top: 10px; }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h2 {
            font-size: 20px;
            color: #00d2ff;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(0,210,255,0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 14px;
        }
        th {
            background: rgba(0,210,255,0.15);
            color: #00d2ff;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .positive { color: #00e676; font-weight: 600; }
        .negative { color: #ff5252; font-weight: 600; }
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .tag-success { background: rgba(0,230,118,0.2); color: #00e676; }
        .tag-warning { background: rgba(255,215,64,0.2); color: #ffd740; }
        .tag-danger { background: rgba(255,82,82,0.2); color: #ff5252; }
        .highlight-box {
            background: rgba(0,210,255,0.1);
            border-left: 4px solid #00d2ff;
            padding: 15px 20px;
            margin: 15px 0;
            border-radius: 0 8px 8px 0;
        }
        .risk-box {
            background: rgba(255,82,82,0.1);
            border-left: 4px solid #ff5252;
            padding: 15px 20px;
            margin: 15px 0;
            border-radius: 0 8px 8px 0;
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 13px;
        }
        .update-time {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 A股盘前晨报</h1>
            <div class="date">{{DATE}}（周一）</div>
            <div class="update-time">最后更新：{{DATETIME}} | 数据来源：财联社、东方财富、同花顺</div>
        </div>

        <div class="card">
            <h2>🌍 隔夜国际市场表现</h2>
            <p style="color:#888; text-align:center; padding:40px;">今日晨报正在生成中...</p>
        </div>

        <div class="card">
            <h2>📰 重大新闻与政策舆情</h2>
            <p style="color:#888; text-align:center; padding:40px;">请稍候，数据加载中...</p>
        </div>

        <div class="card">
            <h2>📊 板块影响分析</h2>
            <p style="color:#888; text-align:center; padding:40px;">分析数据更新中...</p>
        </div>

        <div class="footer">
            <p>免责声明：本报告仅供参考，不构成投资建议。市场有风险，投资需谨慎。</p>
            <p>Generated by OpenClaw · 每日自动更新</p>
        </div>
    </div>
</body>
</html>
